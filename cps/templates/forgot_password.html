{% extends "layout.html" %}
{% block body %}
<link rel="stylesheet" href="{{ url_for('static', filename='newStyles/css/login-register.css') }}">

<div class="log-container">
  <div class="left-column">
    <div class="form-container">
      <div id="forgotPasswordForm">
        <h1>{{_('Forgot Password')}}</h1>
        <p class="subtitle">{{_('Enter your email to receive a reset code')}}</p>

        <form method="POST" role="form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          
          <div class="form-group">
            <label for="email">{{_('Email Address')}}</label>
            <input type="email" id="email" name="email" placeholder="{{_('Enter your registered email')}}" required>
          </div>

          <button type="submit" class="btn-primary">{{_('Send Reset Code')}}</button>
          
          <p class="footer-text">
            {{_('Remember your password?')}}
            <a href="/login" class="footer-link">{{_('Sign in')}}</a>
          </p>
        </form>
      </div>
    </div>
  </div>
  <div class="right-column"></div>
</div>

{% if error %}
<div class="col-sm-6 col-sm-offset-2">
  <div class="alert alert-danger">{{error}}</div>
</div>
{% endif %}

<script>
  const navbarDefault = document.getElementById("navbar-default-id");
  if (navbarDefault) navbarDefault.style.display = "none";
  const sideBar = document.getElementById("left-side-container-id");
  if (sideBar) sideBar.style.display = "none";
</script>
{% endblock %}
