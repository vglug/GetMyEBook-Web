{% extends "layout.html" %}
{% block body %}
<link rel="stylesheet" href="{{ url_for('static', filename='newStyles/css/login-register.css') }}">

<div class="log-container">
  <div class="left-column">
    <div class="form-container">
      <div id="newPasswordForm">
        <h1>{{_('New Password')}}</h1>
        <p class="subtitle">{{_('Create a strong password for your account')}}</p>

        <form method="POST" role="form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          
          <div class="form-group" style="position: relative;">
            <label for="password">{{ _('New Password') }}</label>
            <input type="password" id="password" name="password" placeholder="{{_('Enter new password')}}" required style="padding-right: 40px;">
            <img id="togglePassword1"
                 src="{{ url_for('static', filename='newStyles/img/eye-on.svg') }}"
                 alt="Show Password"
                 onclick="togglePassword('password', 'togglePassword1')"
                 style="position: absolute; right: 15px; top: 42px; width: 20px; height: 20px; cursor: pointer; user-select: none;">
          </div>

          <div class="form-group" style="position: relative;">
            <label for="confirm_password">{{_('Confirm Password')}}</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="{{_('Confirm your new password')}}" required style="padding-right: 40px;">
            <img id="togglePassword2"
                 src="{{ url_for('static', filename='newStyles/img/eye-on.svg') }}"
                 alt="Show Password"
                 onclick="togglePassword('confirm_password', 'togglePassword2')"
                 style="position: absolute; right: 15px; top: 42px; width: 20px; height: 20px; cursor: pointer; user-select: none;">
          </div>

          <button type="submit" class="btn-primary">{{_('Change Password')}}</button>
        </form>
      </div>
    </div>
  </div>
  <div class="right-column"></div>
</div>

{% if error %}
<div class="col-sm-6 col-sm-offset-2">
  <div class="alert alert-danger">{{error}}</div>
</div>
{% endif %}

<script>
  const navbarDefault = document.getElementById("navbar-default-id");
  if (navbarDefault) navbarDefault.style.display = "none";
  const sideBar = document.getElementById("left-side-container-id");
  if (sideBar) sideBar.style.display = "none";

  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === "password") {
      input.type = "text";
      icon.src = "{{ url_for('static', filename='newStyles/img/eye-off.svg') }}";
    } else {
      input.type = "password";
      icon.src = "{{ url_for('static', filename='newStyles/img/eye-on.svg') }}";
    }
  }
</script>
{% endblock %}
